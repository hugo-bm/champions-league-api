openapi: 3.0.3
info:
  title: API Champions League
  description: API para consultar estatisticas atualizadas sobre equipes, jogadores, partidas e classificacoes.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Servidor local de desenvolvimento
paths:
  /health:
    get:
      summary: Verifica o status da API
      responses:
        '200':
          description: API disponível
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
/clubs:
    get:
      summary: Obtem a lista de clubes
      responses:
        '200':
          description: Retorna um array contendo as informações sobre os clubs cadastrados
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 1
                  name:
                    type: string
                    example: Liverpool
                  country:
                    type: string
                    example: England
/clubs/{clubId}:
    get:
      summary: Obter club por ID
      parameters:
        - name: clubID
          in: path
          descritpion: O Identificador numerico do club
          requiured: true
          schema:
            type: integer
            format: int64
            example: 12
      responses:
        '200':
          description: Operação bem sucedida
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: number
                    example: 1
                  name:
                    type: string
                    example: Liverpool
                  country:
                    type: string
                    example: England